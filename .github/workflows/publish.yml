name: Publish to npm

on:
  release:
    types: [created]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Show package info
        run: |
          node -v
          npm -v
          node -p "require('./package.json').name"
          node -p "require('./package.json').version"

      - name: Install dependencies
        run: npm ci

      - name: Build the CLI
        run: npm run build

      - name: Verify npm auth and package access
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "Authenticated npm user:"
          npm whoami

          echo "Checking package visibility on registry..."
          npm view openmerlin name version || true

      - name: Ensure release tag matches package version
        if: github.event_name == 'release'
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG_NAME="${{ github.event.release.tag_name }}"
          echo "Package version tag should be: $PKG_VERSION"
          echo "Release tag is: $TAG_NAME"
          test "$PKG_VERSION" = "$TAG_NAME"

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public